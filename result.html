  </div>

  <script>

    const translations = {

      en: {
        dashboard: "Dashboard",

        label: "IMAGING METADATA",

        title: "Imaging record added successfully.",

        subtitle:
          "Structured imaging metadata has been added to the patient's imaging timeline.",

        history: "View Imaging Timeline →",

        addAnother: "Add another record",

        scanId: "Scan ID",

        patientId: "Patient ID",

        scanType: "Scan Type",

        bodyPart: "Body Part",

        date: "Date",

        provider: "Provider",

        radiation: "Radiation Level",

        dose: "Estimated Dose",

        notes: "Notes",

        warning:
          "⚠ Similar imaging may already exist in the patient's history. Please verify whether previous imaging can be reused before repeating the examination.",

        noData: "No imaging metadata selected."
      },

      de: {
        dashboard: "Dashboard",

        label: "BILDGEBUNGS-METADATEN",

        title: "Bildgebungseintrag erfolgreich hinzugefügt.",

        subtitle:
          "Strukturierte Bildgebungs-Metadaten wurden zur Bildgebungszeitleiste des Patienten hinzugefügt.",

        history: "Bildgebungszeitleiste ansehen →",

        addAnother: "Weiteren Eintrag hinzufügen",

        scanId: "Scan-ID",

        patientId: "Patienten-ID",

        scanType: "Scan-Typ",

        bodyPart: "Körperbereich",

        date: "Datum",

        provider: "Anbieter/Klinik",

        radiation: "Strahlenlevel",

        dose: "Geschätzte Dosis",

        notes: "Notizen",

        warning:
          "⚠ Ähnliche Bildgebung könnte bereits in der Historie vorhanden sein. Bitte prüfen, ob frühere Bildgebung wiederverwendet werden kann, bevor eine neue Untersuchung durchgeführt wird.",

        noData: "Keine Bildgebungs-Metadaten ausgewählt."
      }
    };

    function setLang(lang) {
      localStorage.setItem("lang", lang);
      applyLang();
      renderScan();
    }

    function applyLang() {
      const lang = localStorage.getItem("lang") || "en";
      const t = translations[lang];

      document.querySelectorAll("[data-i18n]").forEach(el => {
        el.textContent = t[el.dataset.i18n];
      });
    }

    function renderScan() {

      const lang = localStorage.getItem("lang") || "en";
      const t = translations[lang];

      const scan =
        JSON.parse(localStorage.getItem("selectedScan"));

      const container =
        document.getElementById("scanDetails");

      if (!scan) {
        container.innerHTML = `<h2>${t.noData}</h2>`;
        return;
      }

      container.innerHTML = `

        <div class="history-record-top">

          <div>
            <p class="section-label">${scan.scanId}</p>
            <h2>${scan.scanType}</h2>
          </div>

          <span>${scan.dose}</span>

        </div>

        <div class="history-details">

          <p><strong>${t.scanId}:</strong> ${scan.scanId}</p>

          <p><strong>${t.patientId}:</strong> ${scan.patientId}</p>

          <p><strong>${t.scanType}:</strong> ${scan.scanType}</p>

          <p><strong>${t.bodyPart}:</strong> ${scan.bodyPart}</p>

          <p><strong>${t.date}:</strong> ${scan.date}</p>

          <p><strong>${t.provider}:</strong>
             ${scan.provider || "External Radiology Clinic"}
          </p>

          <p><strong>${t.radiation}:</strong>
             ${scan.radiationLevel}
          </p>

          <p><strong>${t.dose}:</strong>
             ${scan.dose}
          </p>

          <p><strong>${t.notes}:</strong>
             ${scan.notes}
          </p>

        </div>

        <div class="repeat-warning">
          ${t.warning}
        </div>

      `;
    }

    applyLang();
    renderScan();

  </script>

</body>
</html>
