<!DOCTYPE html>
<html>
<head>
  <title>Imaging Passport Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <h1>Imaging Passport</h1>
    <p>Your personal medical imaging history in one place.</p>

    <div class="card">
      <h2>Login</h2>

      <label>Patient ID</label>
      <input id="patientId" placeholder="P-001">

      <button onclick="login()">Login as Patient</button>
    </div>
  </div>

  <script>
    function login() {
      const patientId = document.getElementById("patientId").value || "P-001";
      localStorage.setItem("loggedInPatient", patientId);
      window.location.href = "dashboard.html";
    }
  </script>
</body>
</html>
